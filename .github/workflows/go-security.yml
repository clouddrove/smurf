name: Go Security & Coverage

# Vulnerability scanning (govulncheck) and unit-test coverage reporting.
# Runs on PRs and pushes to the default branch. The existing shared pr-checks
# workflow validates commit/PR conventions; this adds Go-specific safety.

on:
  pull_request:
  push:
    branches: [ master ]

permissions:
  contents: read

env:
  GO_VERSION: 1.26.0

jobs:
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...

  coverage:
    name: Unit-test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test with coverage
        # Unit packages only. The ./test/... integration suites need docker,
        # helm, and terraform binaries and are exercised elsewhere.
        run: |
          set -euo pipefail
          PKGS=$(go list ./... | grep -v '/test/')
          go test -covermode=atomic -coverprofile=coverage.out $PKGS
          echo "### Unit-test coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1
