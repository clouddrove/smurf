name: Release
on:
  push:
    tags: [ v* ]
env:
  GO_VERSION: 1.26.0
  REPO: ${{ github.repository }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: '~> v2'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # TAP_GITHUB_TOKEN must be a PAT (classic or fine-grained) with repo
        # write access to clouddrove/homebrew-tap. It is used by the `brews`
        # section in .goreleaser.yml to push the updated Formula/smurf.rb;
        # the default GITHUB_TOKEN above only has write access to this repo.
        TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    name: Build the docker image
    needs: goreleaser
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker Image
        run: |
          make image IMAGE=ghcr.io/${{env.REPO}}:${{ github.ref_name }} VERSION=${{ github.ref_name }}

      - name: Tag latest
        run: docker tag ghcr.io/${{env.REPO}}:${{ github.ref_name }} ghcr.io/${{env.REPO}}:latest

      - name: Push Docker Image
        run: docker push ghcr.io/${{env.REPO}}:${{ github.ref_name }}

      - name: Push Latest Tag
        run: docker push ghcr.io/${{env.REPO}}:latest
