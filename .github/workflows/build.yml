name: Build

env:
  GO_VERSION: 1.26.0
  APP_PACKAGE: github.com/clouddrove/smurf/cmd 

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{env.GO_VERSION}}

      - name: Go Mod Tidy
        run: go mod tidy

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Get Build Info
        id: buildinfo
        run: |
          set -euo pipefail
          echo "Collecting build information..."
          
          # Get version from GitHub releases or git tags
          VERSION=$(curl -sf https://api.github.com/repos/clouddrove/smurf/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || git describe --tags --abbrev=0)
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          echo "Version: $VERSION"
          echo "Commit: $COMMIT"
          echo "Build Date: $DATE"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building with version injection:"
          echo "Package: ${{env.APP_PACKAGE}}"
          echo "Version: ${{steps.buildinfo.outputs.version}}"
          echo "Commit: ${{steps.buildinfo.outputs.commit}}"
          echo "Date: ${{steps.buildinfo.outputs.date}}"
          
          go build -a \
            -ldflags "\
              -X '${{env.APP_PACKAGE}}.version=${{steps.buildinfo.outputs.version}}' \
              -X '${{env.APP_PACKAGE}}.commit=${{steps.buildinfo.outputs.commit}}' \
              -X '${{env.APP_PACKAGE}}.date=${{steps.buildinfo.outputs.date}}'" \
            -o smurf .

      - name: Verify Version
        run: |
          echo "Binary version report:"
          ./smurf --version
          ./smurf version

      - name: Check CLI docs are up to date
        run: |
          make docs
          if [ -n "$(git status --porcelain docs/sm/docs/cli)" ]; then
            echo "Generated CLI docs in docs/sm/docs/cli are out of date."
            echo "Run 'make docs' locally and commit the result."
            git status --porcelain docs/sm/docs/cli
            git diff -- docs/sm/docs/cli
            exit 1
          fi

  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{env.GO_VERSION}}
      - name: Check gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
