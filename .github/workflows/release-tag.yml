name: Tag Release

on:
  pull_request:
    types: [closed]

jobs:
  handle-release:
    if: github.event.pull_request.merged == true
    uses: clouddrove/github-shared-workflows/.github/workflows/release-tag.yml@f96c56e0b808bb0f84fc9882cd412b126914053d
    with:
      target_branch: ${{ github.event.pull_request.base.ref }}
      tag_format: "vX.Y.Z"  # or "X.Y.Z" depending on your preference
    secrets:
      GITHUB: ${{ secrets.GITHUB }}